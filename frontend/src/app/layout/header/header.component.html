<header class="topbar">
  <a class="topbar__brand" routerLink="/">
    <span class="topbar__logo" aria-hidden="true">▲</span>
    <span class="topbar__name">idea<em>arena</em></span>
  </a>

  <form class="topbar__search" (ngSubmit)="onSubmit()">
    <span class="topbar__search-icon" aria-hidden="true">🔍</span>
    <input
      type="search"
      name="q"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onInput($event)"
      placeholder="Search ideas…"
      autocomplete="off"
      aria-label="Search ideas"
    />
  </form>

  <div class="topbar__actions" *ngIf="currentUser$ | async as user; else guestActions">
    <a class="btn btn--primary topbar__create" routerLink="/submit">+ Create</a>

    <!-- Messages -->
    <button type="button" class="icon-btn" (click)="goToMessages()" aria-label="Messages">
      ✉️
      <span class="icon-btn__badge" *ngIf="(unreadMessages$ | async) as unread">
        {{ unread > 9 ? '9+' : unread }}
      </span>
    </button>

    <!-- Notifications -->
    <div class="menu-host">
      <button
        type="button"
        class="icon-btn"
        (click)="toggleMenu('notifications')"
        aria-label="Notifications"
      >
        🔔
        <span class="icon-btn__badge" *ngIf="(unreadNotifications$ | async) as unread">
          {{ unread > 9 ? '9+' : unread }}
        </span>
      </button>

      <div class="dropdown dropdown--wide" *ngIf="openMenu === 'notifications'">
        <div class="dropdown__title">Notifications</div>
        <ng-container *ngIf="notifications$ | async as items">
          <div class="dropdown__empty" *ngIf="items.length === 0">Nothing here yet.</div>
          <button
            type="button"
            class="notif"
            *ngFor="let n of items"
            [class.unread]="!n.isRead"
            (click)="openNotification(n)"
          >
            <span class="notif__text">{{ n.text }}</span>
            <span class="notif__time">{{ n.createdAtUtc | timeAgo }}</span>
          </button>
        </ng-container>
      </div>
    </div>

    <!-- Avatar menu -->
    <div class="menu-host">
      <button type="button" class="avatar-btn" (click)="toggleMenu('avatar')" aria-label="Account">
        <app-avatar [avatarId]="user.avatarId" [size]="32"></app-avatar>
      </button>

      <div class="dropdown" *ngIf="openMenu === 'avatar'">
        <div class="dropdown__user">
          <app-avatar [avatarId]="user.avatarId" [size]="40"></app-avatar>
          <div class="dropdown__user-text">
            <strong>{{ user.displayName || 'Member' }}</strong>
            <small>{{ user.email }}</small>
          </div>
        </div>

        <button type="button" class="dropdown__item" (click)="changingAvatar = !changingAvatar">
          🎭 Change avatar
        </button>

        <div class="avatar-grid" *ngIf="changingAvatar">
          <button
            type="button"
            class="avatar-grid__cell"
            *ngFor="let a of avatars"
            [class.active]="a.id === user.avatarId"
            (click)="pickAvatar(a.id)"
            [attr.aria-label]="a.id"
          >
            <app-avatar [avatarId]="a.id" [size]="34"></app-avatar>
          </button>
        </div>

        <button type="button" class="dropdown__item dropdown__item--danger" (click)="onLogout()">
          🚪 Log out
        </button>
      </div>
    </div>
  </div>

  <ng-template #guestActions>
    <div class="topbar__actions">
      <a class="btn btn--ghost" routerLink="/auth/login">Log in</a>
      <a class="btn btn--primary" routerLink="/auth/register">Sign up</a>
    </div>
  </ng-template>

  <div class="topbar__backdrop" *ngIf="openMenu" (click)="closeMenus()"></div>
</header>
