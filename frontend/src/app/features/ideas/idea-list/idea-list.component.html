<div class="page">
  <div class="feed-toolbar card">
    <div class="sort" [class.open]="sortMenuOpen">
      <button type="button" class="sort__button" (click)="toggleSortMenu()">
        <span class="sort__icon">{{ currentSort.icon }}</span>
        <span class="sort__label">{{ currentSort.label }}</span>
        <span class="sort__caret">▾</span>
      </button>

      <div class="sort__backdrop" *ngIf="sortMenuOpen" (click)="toggleSortMenu()"></div>

      <ul class="sort__menu" *ngIf="sortMenuOpen">
        <li
          *ngFor="let option of sortOptions"
          class="sort__option"
          [class.active]="option.value === sort"
          (click)="setSort(option.value)"
        >
          <span class="sort__icon">{{ option.icon }}</span>
          <span class="sort__option-text">
            <span class="sort__option-label">{{ option.label }}</span>
            <span class="sort__option-hint">{{ option.hint }}</span>
          </span>
        </li>
      </ul>
    </div>

    <a class="feed-toolbar__create" routerLink="/submit">+ Create Idea</a>
  </div>

  <div class="search-banner card" *ngIf="search">
    Results for <strong>“{{ search }}”</strong>
    <a routerLink="/">clear</a>
  </div>

  <app-spinner *ngIf="loading" label="Loading ideas…"></app-spinner>

  <div class="feed-error card" *ngIf="error && !loading">
    Something went wrong loading the feed.
    <button type="button" (click)="retry()">Retry</button>
  </div>

  <ng-container *ngIf="!error">
    <div class="feed-empty card" *ngIf="!loading && ideas.length === 0">
      <p *ngIf="search">No ideas match your search.</p>
      <p *ngIf="!search && !isWinnersView">No active ideas right now.</p>
      <p *ngIf="!search && isWinnersView">No closed ideas yet.</p>
      <a *ngIf="!isWinnersView" routerLink="/submit">Post an idea →</a>
    </div>

    <app-idea-card
      *ngFor="let idea of ideas; let i = index; trackBy: trackById"
      [idea]="idea"
      [isWinner]="isWinner(i)"
      [closed]="isWinnersView"
      (vote)="onVote(idea, $event)"
    ></app-idea-card>

    <div #sentinel class="feed-sentinel"></div>

    <app-spinner *ngIf="loadingMore" label="Loading more…"></app-spinner>

    <div class="feed-end" *ngIf="!hasNextPage && !loading && ideas.length > 0">
      🎉 You're all caught up
    </div>
  </ng-container>
</div>
