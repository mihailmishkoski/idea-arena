<div class="auth">
  <div class="auth__card">
    <h1 class="auth__title">Sign up</h1>
    <p class="auth__subtitle">Join the community and pitch your next big idea.</p>

    <div class="auth__error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label>Pick your avatar</label>
        <div class="avatar-picker">
          <button
            type="button"
            class="avatar-picker__cell"
            *ngFor="let a of avatars"
            [class.active]="a.id === selectedAvatarId"
            (click)="selectedAvatarId = a.id"
            [attr.aria-label]="a.id"
          >
            <app-avatar [avatarId]="a.id" [size]="36"></app-avatar>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="displayName">Display name</label>
        <input id="displayName" type="text" formControlName="displayName"
               autocomplete="nickname" placeholder="Ada Lovelace" />
        <small class="field__error"
               *ngIf="form.get('displayName')?.touched && form.get('displayName')?.invalid">
          Enter a name between 2 and 50 characters.
        </small>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="username"
               placeholder="you@example.com" />
        <small class="field__error"
               *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Enter a valid email address.
        </small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password"
               autocomplete="new-password" placeholder="At least 8 characters" />
        <small class="field__error"
               *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          Password must be at least 8 characters.
        </small>
      </div>

      <button type="submit" class="btn-block" [disabled]="submitting">
        {{ submitting ? 'Creating account…' : 'Sign up' }}
      </button>
    </form>

    <p class="auth__alt">
      Already have an account? <a routerLink="/auth/login">Log in</a>
    </p>
  </div>
</div>
